<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
<style>text{font-family:Arial,sans-serif;fill:#eaf2ff}.h{font-size:27px;font-weight:700}.t{font-size:19px}.s{font-size:16px;fill:#b9c8e8}.box{stroke-width:3;rx:18}.arrow{stroke:#87c8ff;stroke-width:4;fill:none;marker-end:url(#a)}</style><defs><marker id="a" markerWidth="11" markerHeight="11" refX="9" refY="4" orient="auto"><path d="M0,0 L0,8 L10,4z" fill="#87c8ff"/></marker></defs>
<rect width="1600" height="900" fill="#07152f"/><text x="70" y="65" class="h" font-size="38">Healthcare Data Platform — Schema &amp; Pipeline Architecture</text><text x="70" y="98" class="s">Neon Postgres • multi-tenant clinical data • synthetic demonstration environment</text>
<rect x="70" y="175" width="310" height="210" class="box" fill="#112c54" stroke="#46c7ef"/><text x="100" y="220" class="h">1. Source Systems</text><text x="100" y="260" class="t">EHR • Lab • Scheduling</text><text x="100" y="292" class="t">Payer • Devices • Portals</text><text x="100" y="335" class="s">FHIR / HL7 / API payloads</text>
<rect x="470" y="175" width="330" height="210" class="box" fill="#17355e" stroke="#62a8ff"/><text x="500" y="220" class="h">2. Integration Layer</text><text x="500" y="260" class="t">integration.external_resources</text><text x="500" y="292" class="t">Validate • Map • Deduplicate</text><text x="500" y="335" class="s">Raw payload retention &amp; replay</text>
<rect x="890" y="145" width="620" height="280" class="box" fill="#153758" stroke="#79e4c0"/><text x="920" y="190" class="h">3. Transactional Clinical Core</text><text x="920" y="232" class="t">clinical.patients • appointments • encounters</text><text x="920" y="266" class="t">observations • conditions • allergies • orders</text><text x="920" y="300" class="t">medication_requests • procedures • documents</text><text x="920" y="350" class="s">Organization-scoped care record; secure operational write path</text>
<rect x="180" y="550" width="370" height="215" class="box" fill="#35275f" stroke="#b89aff"/><text x="210" y="595" class="h">Security &amp; Governance</text><text x="210" y="635" class="t">iam.organizations • facilities</text><text x="210" y="668" class="t">users • roles • audit_events</text><text x="210" y="715" class="s">Access control, tenant scope, audit trail</text>
<rect x="650" y="550" width="360" height="215" class="box" fill="#164858" stroke="#57ddc0"/><text x="680" y="595" class="h">Revenue Cycle</text><text x="680" y="635" class="t">billing.charges → claims</text><text x="680" y="668" class="t">claim_lines → payments</text><text x="680" y="715" class="s">Service capture and payer outcome</text>
<rect x="1110" y="550" width="330" height="215" class="box" fill="#3b2f63" stroke="#ba91ff"/><text x="1140" y="595" class="h">Events &amp; Analytics</text><text x="1140" y="635" class="t">integration.outbox_events</text><text x="1140" y="668" class="t">analytics.daily_encounter_metrics</text><text x="1140" y="715" class="s">CDC • dashboards • reporting</text>
<path class="arrow" d="M380 280H470"/><path class="arrow" d="M800 280H890"/><path class="arrow" d="M1120 425V540"/><path class="arrow" d="M980 425V540"/><path class="arrow" d="M900 385L530 550"/><path class="arrow" d="M1010 385L830 550"/>
<text x="70" y="850" class="s">Design principle: retain raw inputs → normalize clinical truth → atomically emit events → derive billing → aggregate for analytics.</text></svg>
